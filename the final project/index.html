  <!DOCTYPE html>
  <html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweatyPalms</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
  <div class="page-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">
          <span class="logo-badge"></span>
          <div class="logo-text"><strong>SweatyPalms</strong><span></span></div>
        </a>
        <nav class="main-nav">
          <a href="index.html" class="nav-link active">Главная</a>
          <a href="catalog.html" class="nav-link">Каталог</a>
        </nav>
        <div class="header-actions">
          <button id="themeToggle" class="icon-btn">🌙</button>
        </div>
      </div>
    </header>
    <main>
      <section class="hero-section">
        <div class="container hero-grid">
          <div class="hero-content">
            <h1>Заходи к нам<span class="gradient"> в игровой портал</span></h1>
            <p>4 браузерных игр на чистом JavaScript. Неоновые огни, реактивный геймплей — всё локально и без фреймворков.</p>
            <div class="hero-stats">
              <div class="stat-card"><strong>4</strong> игры</div>
              <div class="stat-card"><strong>3</strong> уровня</div>
            </div>
            <a href="catalog.html" class="btn btn-primary">Залетай в каталог</a>
          </div>
      </section>
      <section class="container">
        <div class="features-grid">
          <div class="feature-card"><h3 style="color: var(--neon-blue);">🎲 ЛЁГКИЕ</h3></div>
          <div class="feature-card"><h3 style="color: var(--neon-blue);">🧠 СРЕДНИЕ</h3></div>
          <div class="feature-card"><h3 style="color: var(--neon-blue);">⚡ СЛОЖНЫЕ</h3></div>
        </div>
      </section>
    </main>
    <footer><div class="container">SweatyPalms — итоговый проект. Играй и забей на учебу</div></footer>
  </div>
  <script src="main.js"></script>
  </body>
  </html>
